[hook]
; Set to 0 to prevent hook installation.
; Default: 1
hook_enabled=1

; Log verbosity: debug | info | warn | error | silent.
; Default: info
log_level=info

; Optional path to a log file. Messages are appended.
; Leave empty to log to stderr only.
; Default: (empty)
log_file=

[socket]
; Path to the Unix domain socket.
; Default: /tmp/kfds_hook.sock
socket_path=/tmp/kfds_hook.sock

; Max socket polls per second. 
; Default: 100
;socket_maxpoll=100

; Command timeout in seconds.
; Minimum: 1
; Default: 2
socket_deadline=2