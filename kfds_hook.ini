[hook]
; Set to 0 to prevent hook installation.
; Default: 1
hook_enabled=1

; Apply the security check bypass patch.
; Suppresses all "STEAMSTATS: SECURITY CHECK FAILED" console output.
; Default: 1
security_patch=1

; SHA-256 digest of the server binary (/proc/self/exe).
; If set, the hook will refuse to install if the checksum does not match.
; Leave empty (or omit) to skip verification.
; Default: 1ddb2110e71400137dc4fc527af94458556b08c0649f5ba65307f95811484756
ucc_checksum=1ddb2110e71400137dc4fc527af94458556b08c0649f5ba65307f95811484756

; Log verbosity: debug | info | warn | error | silent.
; Default: info
log_level=info

; Optional path to a log file. Messages are appended.
; Leave empty to log to stderr only.
; Default: (empty)
log_file=

[socket]
; Path to the Unix domain socket.
; Default: /tmp/kfds_hook.sock
socket_path=/tmp/kfds_hook.sock

; Max socket polls per second.
; Default: 10
socket_maxpoll=10

; Command timeout in seconds.
; Minimum: 1
; Maximum: 30
; Default: 2
socket_deadline=2

[debug]
; Directory for debug dump files.
; Created automatically if it does not exist. 
; Default: ./dump
debug_dump_dir=./dump